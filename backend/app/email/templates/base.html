<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin: 0; padding: 0; background-color: #f4f6f9; font-family: Arial, sans-serif; }
    .container { max-width: 640px; margin: 0 auto; background: #ffffff; }
    .header { background: linear-gradient(135deg, #1a1f3d 0%, #131829 100%); padding: 32px; text-align: center; }
    .header h1 { color: #48cae1; font-size: 24px; margin: 0; font-weight: 700; }
    .header p { color: rgba(255,255,255,0.5); font-size: 13px; margin: 8px 0 0; }
    .content { padding: 32px; }
    .kpi-row { display: flex; gap: 16px; margin-bottom: 24px; }
    .kpi-card { flex: 1; background: #f8f9fc; border-radius: 12px; padding: 16px; text-align: center; border: 1px solid #e8edf2; }
    .kpi-value { font-size: 24px; font-weight: 700; color: #1a1f3d; }
    .kpi-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #64748b; margin-top: 4px; }
    .section-title { font-size: 16px; font-weight: 700; color: #1a1f3d; margin: 24px 0 12px; }
    table.data { width: 100%; border-collapse: collapse; font-size: 13px; }
    table.data th { background: #48cae1; color: white; padding: 10px 12px; text-align: left; font-weight: 600; }
    table.data td { padding: 10px 12px; border-bottom: 1px solid #e8edf2; color: #32373c; }
    table.data tr:nth-child(even) td { background: #f8f9fc; }
    .footer { background: #f4f6f9; padding: 24px; text-align: center; font-size: 12px; color: #94a3b8; }
    .footer a { color: #48cae1; text-decoration: none; }
    .accent { color: #48cae1; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>RT Reporting</h1>
      <p>{{ report_title }}</p>
    </div>
    <div class="content">
      {% block content %}{% endblock %}
    </div>
    <div class="footer">
      <p>This report was automatically generated by RT Reporting</p>
      <p>Refreshed Tech &bull; <a href="{{ frontend_url }}">Open Dashboard</a></p>
    </div>
  </div>
</body>
</html>
